name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: premium88.web-hosting.com
          username: mauri@mauriziomcarollo.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /mauriportfolio/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .cpanel.yml
